<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loku</title>
  <style>
    :root {
      color-scheme: light dark;
      --color-bg:          #ffffff;
      --color-surface:     #f0f0f0;
      --color-text:        #111111;
      --color-link:        #0055cc;
      --color-error:       #cc2200;
      --color-placeholder: #cccccc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:          #111111;
        --color-surface:     #1e1e1e;
        --color-text:        #eeeeee;
        --color-link:        #77aaff;
        --color-error:       #ff8888;
        --color-placeholder: #333333;
      }
    }
    body { margin: 0; font-family: sans-serif; background: var(--color-bg); color: var(--color-text); }
    a { color: var(--color-link); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/elm.js"></script>
  <script>
    var app = Elm.Main.init({ node: document.getElementById('app') });
    app.ports.logError.subscribe(function(msg) {
      console.error('[loku]', msg);
    });
  </script>
</body>
</html>
